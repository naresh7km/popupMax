name: AFD Rotator (Loop Mode)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest

    env:
      TARGET_DOMAIN: "https://kotonohaschooljp.com"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ------------------------------------------------
      # LOOP ROTATION
      # ------------------------------------------------
      - name: Run rotation loop
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"

          START_TIME=$(date +%s)

          while true; do
            NOW=$(date +%s)
            ELAPSED=$(( (NOW - START_TIME) / 60 ))

            echo "Running... elapsed minutes: $ELAPSED"

            # Stop after ~5.5 hours (safe before 6h limit)
            if [ "$ELAPSED" -ge 330 ]; then
              echo "Reached max runtime, stopping"
              break
            fi

            INDEX=$(cat .rotation_index 2>/dev/null || echo 0)

            NEW_URL=$(jq -r ".[$INDEX]" endpoints.json)

            if [ "$NEW_URL" = "null" ]; then
              echo "No more endpoints"
              break
            fi

            echo "Switching to: $NEW_URL"

            # Update index.js
            awk -v domain="$TARGET_DOMAIN" -v newurl="$NEW_URL" '
            $0 ~ domain { found=1 }
            found && /redirectURL:/ {
              sub(/redirectURL: *"[^"]*"/, "redirectURL: \"" newurl "\"")
              found=0
            }
            { print }
            ' index.js > temp.js && mv temp.js index.js

            # Delete previous endpoint
            if [ "$INDEX" -gt 0 ]; then
              OLD_URL=$(jq -r ".[$((INDEX-1))]" endpoints.json)
              OLD_NAME=$(echo $OLD_URL | cut -d'/' -f3 | cut -d'.' -f1)

              echo "Deleting old endpoint: $OLD_NAME"

              az afd endpoint delete \
                --resource-group "$RG" \
                --profile-name "$PROFILE" \
                --endpoint-name "$OLD_NAME" \
                --yes || true
            fi

            echo $((INDEX+1)) > .rotation_index

            # Commit changes
            git config user.name "afd-bot"
            git config user.email "afd-bot@users.noreply.github.com"
            git add index.js .rotation_index
            git commit -m "Rotate endpoint $INDEX" || true
            git push

            echo "Sleeping 10 minutes..."
            sleep 600
          done
