name: AFD Cleanup (6PM IST - FINAL WORKING)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detach WAF and delete endpoints (safe loop)
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          POLICY="GateGuardSecurity"

          echo "Fetching endpoints..."

          ENDPOINTS=$(az afd endpoint list \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --query "[?tags.\"created-by\"=='github-actions'].name" \
            -o tsv)

          if [ -z "$ENDPOINTS" ]; then
            echo "No endpoints found"
            exit 0
          fi

          for EP in $ENDPOINTS; do
            echo "-----------------------------"
            echo "Processing: $EP"

            EP_ID=$(az afd endpoint show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --query id -o tsv)

            echo "Getting current WAF domains..."

            CURRENT=$(az afd security-policy show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$POLICY" \
              --query "parameters.wafPolicy.domains[].id" \
              -o tsv)

            NEW_DOMAINS=()

            for d in $CURRENT; do
              if [ "$d" != "$EP_ID" ]; then
                NEW_DOMAINS+=("$d")
              fi
            done

            # ⚠️ Azure requires at least ONE domain
            if [ ${#NEW_DOMAINS[@]} -eq 0 ]; then
              echo "Skipping WAF update (last domain cannot be removed)"
            else
              echo "Updating WAF without $EP..."

              az afd security-policy update \
                --resource-group "$RG" \
                --profile-name "$PROFILE" \
                --security-policy-name "$POLICY" \
                --domains "${NEW_DOMAINS[@]}"
            fi

            echo "Waiting for propagation..."
            sleep 30

            echo "Deleting endpoint: $EP"

            for i in 1 2 3 4; do
              az afd endpoint delete \
                --resource-group "$RG" \
                --profile-name "$PROFILE" \
                --endpoint-name "$EP" \
                --yes && break

              echo "Retry $i..."
              sleep 10
            done
          done

          echo "Cleanup completed"
