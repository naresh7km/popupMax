name: AFD Cleanup (6PM IST - FINAL FIX)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detach WAF and delete endpoints
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          POLICY="GateGuardSecurity"

          echo "Fetching endpoints..."
          ENDPOINTS=$(az afd endpoint list \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --query "[?tags.\"created-by\"=='github-actions'].name" \
            -o tsv)

          if [ -z "$ENDPOINTS" ]; then
            echo "No endpoints found"
            exit 0
          fi

          echo "Fetching current WAF domains..."

          CURRENT=$(az afd security-policy show \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --security-policy-name "$POLICY" \
            --query "parameters.wafPolicy.domains[].id" \
            -o tsv)

          # Convert to array
          DOMAINS=()
          for d in $CURRENT; do
            DOMAINS+=("$d")
          done

          echo "Filtering out bot endpoints..."

          for EP in $ENDPOINTS; do
            EP_ID=$(az afd endpoint show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --query id -o tsv)

            NEW_DOMAINS=()
            for d in "${DOMAINS[@]}"; do
              if [ "$d" != "$EP_ID" ]; then
                NEW_DOMAINS+=("$d")
              fi
            done
            DOMAINS=("${NEW_DOMAINS[@]}")
          done

          echo "Final domains to keep:"
          printf "%s\n" "${DOMAINS[@]}"

          echo "Updating WAF policy..."

          if [ ${#DOMAINS[@]} -eq 0 ]; then
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$POLICY" \
              --domains
          else
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$POLICY" \
              --domains "${DOMAINS[@]}"
          fi

          echo "Waiting for Azure propagation (IMPORTANT)..."
          sleep 60

          echo "Deleting endpoints..."

          delete_ep () {
            EP=$1

            for i in 1 2 3 4 5; do
              az afd endpoint delete \
                --resource-group "$RG" \
                --profile-name "$PROFILE" \
                --endpoint-name "$EP" \
                --yes && break

              echo "Retry $i for $EP..."
              sleep 10
            done
          }

          export -f delete_ep
          export RG PROFILE

          echo "$ENDPOINTS" | xargs -n 1 -P 4 -I {} bash -c 'delete_ep "$@"' _ {}

          echo "Cleanup completed"
