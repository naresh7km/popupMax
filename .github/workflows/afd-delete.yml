name: AFD Cleanup (6PM IST - Final Fix)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detach WAF and delete endpoints
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          SECURITY_POLICY_NAME="GateGuardSecurity"

          echo "Fetching bot endpoints..."

          ENDPOINTS=$(az afd endpoint list \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --query "[?tags.\"created-by\"=='github-actions'].name" \
            -o tsv)

          if [ -z "$ENDPOINTS" ]; then
            echo "No endpoints found"
            exit 0
          fi

          echo "Fetching current WAF domains..."

          CURRENT_DOMAINS=$(az afd security-policy show \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --security-policy-name "$SECURITY_POLICY_NAME" \
            --query "parameters.wafPolicy.domains[].id" \
            -o tsv)

          UPDATED_DOMAINS="$CURRENT_DOMAINS"

          for EP in $ENDPOINTS; do
            echo "Processing endpoint: $EP"

            EP_ID=$(az afd endpoint show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --query id -o tsv)

            UPDATED_DOMAINS=$(echo "$UPDATED_DOMAINS" | grep -v "$EP_ID" || true)
          done

          echo "Updating WAF policy..."

          if [ -z "$UPDATED_DOMAINS" ]; then
            echo "No domains left → clearing associations"

            # 🔥 Correct way: no --domains flag
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME"

          else
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME" \
              --domains $UPDATED_DOMAINS
          fi

          echo "Waiting 20 seconds..."
          sleep 20

          echo "Deleting endpoints..."

          delete_endpoint () {
            EP=$1

            for i in 1 2 3; do
              az afd endpoint delete \
                --resource-group "$RG" \
                --profile-name "$PROFILE" \
                --endpoint-name "$EP" \
                --yes && break

              echo "Retry $i for $EP..."
              sleep 5
            done
          }

          export -f delete_endpoint
          export RG PROFILE

          echo "$ENDPOINTS" | xargs -n 1 -P 5 -I {} bash -c 'delete_endpoint "$@"' _ {}

          echo "Cleanup completed"
