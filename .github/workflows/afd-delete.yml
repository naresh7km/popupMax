name: AFD Cleanup (6PM IST - Detach WAF + Delete)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *" # 6:00 PM IST

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ------------------------------------------------
      # DETACH WAF + DELETE ENDPOINTS
      # ------------------------------------------------
      - name: Detach WAF and delete endpoints
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          SECURITY_POLICY_NAME="GateGuardSecurity"

          echo "Fetching endpoints created by GitHub..."

          ENDPOINTS=$(az afd endpoint list \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --query "[?tags.\"created-by\"=='github-actions'].name" \
            -o tsv)

          if [ -z "$ENDPOINTS" ]; then
            echo "No endpoints to process"
            exit 0
          fi

          # ------------------------------------------------
          # ✅ FIXED WAF DETACH LOGIC (ARRAY SAFE)
          # ------------------------------------------------
          echo "Fetching current WAF domains..."

          mapfile -t CURRENT_ARRAY < <(
            az afd security-policy show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME" \
              --query "parameters.wafPolicy.domains[].id" \
              -o tsv
          )

          echo "Fetching bot endpoint IDs..."

          mapfile -t BOT_ARRAY < <(
            az afd endpoint list \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --query "[?tags.\"created-by\"=='github-actions'].id" \
              -o tsv
          )

          echo "Filtering domains (removing bot endpoints)..."

          CLEANED=()

          for DOMAIN in "${CURRENT_ARRAY[@]}"; do
            SKIP=false
            for BOT in "${BOT_ARRAY[@]}"; do
              if [[ "$DOMAIN" == "$BOT" ]]; then
                SKIP=true
                break
              fi
            done

            if [ "$SKIP" = false ]; then
              CLEANED+=("$DOMAIN")
            fi
          done

          echo "Final domains after cleanup:"
          printf "%s\n" "${CLEANED[@]}"

          echo "Updating WAF policy..."

          if [ ${#CLEANED[@]} -gt 0 ]; then
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME" \
              --domains "${CLEANED[@]}"
          else
            echo "No domains left → setting empty list"
            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME" \
              --domains ""
          fi

          # ------------------------------------------------
          # DELETE ENDPOINTS
          # ------------------------------------------------
          echo "Waiting for WAF detach to propagate..."
          sleep 20

          for EP in $ENDPOINTS; do
            echo "Deleting endpoint: $EP"

            az afd endpoint delete \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --yes || true
          done

          echo "Cleanup completed"
