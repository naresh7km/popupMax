name: AFD Cleanup (6PM IST - Detach WAF + Delete)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *" # 6:00 PM IST

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ------------------------------------------------
      # DETACH WAF + DELETE ENDPOINTS
      # ------------------------------------------------
      - name: Detach WAF and delete endpoints
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          SECURITY_POLICY_NAME="GateGuardSecurity"  # 🔥 PUT YOUR POLICY NAME

          echo "Fetching endpoints created by GitHub..."

          ENDPOINTS=$(az afd endpoint list \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --query "[?tags.\"created-by\"=='github-actions'].name" \
            -o tsv)

          if [ -z "$ENDPOINTS" ]; then
            echo "No endpoints to process"
            exit 0
          fi

          # 🔥 Get current domains list once
          CURRENT_DOMAINS=$(az afd security-policy show \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --security-policy-name "$SECURITY_POLICY_NAME" \
            --query "parameters.wafPolicy.domains[].id" \
            -o tsv)

          UPDATED_DOMAINS="$CURRENT_DOMAINS"

          for EP in $ENDPOINTS; do
            echo "Processing endpoint: $EP"

            EP_ID=$(az afd endpoint show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --query id -o tsv)

            # Remove this endpoint from domains list
            UPDATED_DOMAINS=$(echo "$UPDATED_DOMAINS" | grep -v "$EP_ID" || true)
          done

          # 🔥 Update WAF once (clean list)
          if [ -n "$UPDATED_DOMAINS" ]; then
            echo "Updating WAF policy (detaching endpoints)..."

            az afd security-policy update \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$SECURITY_POLICY_NAME" \
              --domains $UPDATED_DOMAINS
          else
            echo "No domains left after cleanup"
          fi

          # 🔥 Now delete endpoints
          for EP in $ENDPOINTS; do
            echo "Deleting endpoint: $EP"

            az afd endpoint delete \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$EP" \
              --yes || true
          done

          echo "Cleanup completed"
