name: AFD Endpoint Creator (Parallel + Safe WAF - 5AM IST)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *" # 5:00 AM IST

permissions:
  id-token: write
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ------------------------------------------------
      # PARALLEL ENDPOINT CREATION
      # ------------------------------------------------
      - name: Create endpoints in parallel
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          ORIGIN_GROUP="${{ vars.ORIGIN_GROUP_NAME }}"

          TOTAL=20
          BATCH_SIZE=5

          echo "Starting parallel creation..."
          echo "Total: $TOTAL | Batch size: $BATCH_SIZE"

          > endpoints.txt

          create_endpoint () {
            RAND=$(openssl rand -hex 3)
            NAME="bot${RAND}"
            ROUTE="rt-${RAND}"

            echo "Creating: $NAME"

            az afd endpoint create \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$NAME" \
              --enabled-state Enabled \
              --tags created-by=github-actions

            az afd route create \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$NAME" \
              --route-name "$ROUTE" \
              --origin-group "$ORIGIN_GROUP" \
              --supported-protocols Https \
              --https-redirect Disabled \
              --forwarding-protocol MatchRequest \
              --link-to-default-domain Enabled \
              --patterns-to-match "/*"

            HOST=$(az afd endpoint show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --endpoint-name "$NAME" \
              --query hostName -o tsv)

            echo "https://${HOST}" >> endpoints.txt
          }

          export -f create_endpoint
          export RG PROFILE ORIGIN_GROUP

          seq $TOTAL | xargs -n 1 -P $BATCH_SIZE -I {} bash -c 'create_endpoint'

          jq -R . endpoints.txt | jq -s . > endpoints.json

      # ------------------------------------------------
      # SAFE WAF ATTACH (NO DOMAIN LOSS)
      # ------------------------------------------------
      - name: Attach all endpoints to WAF safely
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ vars.RG_NAME }}"
          PROFILE="${{ vars.AFD_PROFILE_NAME }}"
          POLICY="GateGuardSecurity"

          echo "Fetching existing WAF domains..."

          mapfile -t EXISTING_ARRAY < <(
            az afd security-policy show \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --security-policy-name "$POLICY" \
              --query "parameters.wafPolicy.domains[].id" \
              -o tsv
          )

          echo "Fetching bot endpoints..."

          mapfile -t BOT_ARRAY < <(
            az afd endpoint list \
              --resource-group "$RG" \
              --profile-name "$PROFILE" \
              --query "[?tags.\"created-by\"=='github-actions'].id" \
              -o tsv
          )

          echo "Merging safely..."

          ALL=("${EXISTING_ARRAY[@]}" "${BOT_ARRAY[@]}")

          UNIQUE=$(printf "%s\n" "${ALL[@]}" | sort -u)

          echo "Final domains:"
          echo "$UNIQUE"

          echo "Updating WAF policy..."

          az afd security-policy update \
            --resource-group "$RG" \
            --profile-name "$PROFILE" \
            --security-policy-name "$POLICY" \
            --domains $UNIQUE

      # ------------------------------------------------
      # RESET INDEX
      # ------------------------------------------------
      - name: Reset rotation index
        run: echo "0" > .rotation_index

      # ------------------------------------------------
      # COMMIT FILES
      # ------------------------------------------------
      - name: Commit endpoints
        run: |
          git config user.name "afd-bot"
          git config user.email "afd-bot@users.noreply.github.com"
          git add endpoints.json .rotation_index
          git commit -m "Daily endpoint batch (parallel + safe WAF)" || true
          git push
